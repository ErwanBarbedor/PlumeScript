plume_files['plume-engine/parser/parser'] = function ()

return function(plume)
    local trim = plume.utils.trim
    local contains = plume.utils.containsWord

    local statementPatternList  = require ("plume-engine/parser/statementPatterns")
    local expressionPatternList = require ("plume-engine/parser/expressionPatterns")

    --- Transforms a stream of lexical tokens into structured semantic elements
    ---@param tokens table[] Sequence of input tokens from lexical analysis
    ---@return table[] Structured tokens with semantic typing and context
    plume.parse = function(tokens)
        local pos = 1
        local inStatementContext = true -- Flag for structural token recognition
        local textAccumulator  -- Buffer for text fragments between structural tokens
        local result = {} -- Final structured token collection

        local captureBeginPos
        local captureTextEndPos
        local captureEndPos

        local function mergeSource(pos1, pos2)
            local source1 = tokens[pos1].source
            local source2 = tokens[pos2].source

            return  {
                filename         = source1.filename,
                sourceFile       = source1.sourceFile,
                absolutePosition = source1.absolutePosition,
                length           = source2.absolutePosition + source2.length - source1.absolutePosition,
            }
        end

        --- Accumulates text content while managing statement context state
        ---@param s string Text fragment to accumulate
        local function pushText(s)
            if not textAccumulator then
                textAccumulator = {}
            end

            if not captureTextBeginPos then
                captureTextBeginPos = captureEndPos
            end

            table.insert(textAccumulator, s)
        end

        --- Finalizes text accumulation and creates TEXT token
        local function popText()
            if textAccumulator then
                local text = table.concat(textAccumulator)

                if #text > 0 then
                    table.insert(
                        result,
                        {
                            kind = "TEXT",
                            content = text,
                            source = mergeSource(
                                captureTextBeginPos,
                                captureTextBeginPos+#textAccumulator-1
                            )
                        }
                    )
                end
                textAccumulator     = nil
                captureTextBeginPos = nil
            end
        end

        --- Adds structured token and clears text buffer
        ---@param token table Token to add to result
        local function pushToken(token)
            popText()
            token.source = mergeSource(captureBeginPos, captureEndPos)
            table.insert(result, token)
        end

        --- Captures all content until line ending
        ---@return string Concatenated line content
        local function captureLine()
            local lineContent = {}
            while tokens[pos] and not contains("NEWLINE ENDLINE", tokens[pos].kind) do
                table.insert(lineContent, tokens[pos].content)
                pos = pos + 1
            end

            return table.concat(lineContent)
        end

        --- Processes macro definition syntax
        local function captureMacro(macroName, islocal)

            if macroName then
                if islocal then
                    pushToken {
                        kind = "LOCAL_MACRO",
                        content = macroName,
                    }
                else
                    pushToken {
                        kind = "MACRO",
                        content = macroName,
                    }
                end
            else
                pushToken {
                    kind = "INLINE_MACRO",
                    content = "",
                }
            end

            while pos < #tokens do
                pos = pos + 1
                token = tokens[pos]

                if token.kind == "SPACE" or token.kind == "COMMA" then
                    -- Skip separators
                elseif token.kind == "TEXT" then
                    pushToken {
                        kind = "LIST_ITEM",
                        content = token.content
                    }
                elseif token.kind == "RPAR" then
                    break
                else
                    error("Unexpected '" .. token.kind .. "' inside arg list")
                end
            end

            pushToken {
                kind = "MACRO_ARG_END",
                content = ""
            }
        end

        local statementHandler = {
            LIST_ITEM = function(match)
                pushToken {
                    kind = "LIST_ITEM",
                    content = ""
                }
            end,
            VOID_LINE = function(match)
                pushToken {
                    kind = "VOID_LINE",
                    content = ""
                }
            end,
            HASH_ITEM = function(match)
                pushToken {
                    kind = "HASH_ITEM",
                    content = match.key.content
                }
            end,
            LOCAL_ASSIGNMENT = function(match)
                pushToken {
                    kind = "LOCAL_ASSIGNMENT",
                    content = match.variable.content
                }
            end,
            ASSIGNMENT = function(match)
                pushToken {
                    kind = "ASSIGNMENT",
                    content = match.variable.content
                }
            end,
            LOCAL_MACRO_DEFINITION = function(match)
                pos = pos - 1
                captureMacro(match.macroName.content, true)
                pos = pos + 1
            end,
            MACRO_DEFINITION = function(match)
                pos = pos - 1
                captureMacro(match.macroName.content)
                pos = pos + 1
            end,
            INLINE_MACRO_DEFINITION = function(match)
                pos = pos - 1
                captureMacro()
                pos = pos + 1
            end,
            RETURN = function(match)
                pushToken {
                    kind = "RETURN",
                    content = ""
                }
            end,
            LINE_STATEMENT = function(match)
                pushToken {
                    kind = match.statement.content:upper(),
                    content = captureLine()
                }
            end,
            ELSE = function(match)
                pushToken {
                    kind = "ELSE",
                    content = ""
                }
            end,
            BREAK = function(match)
                pushToken {
                    kind = "BREAK",
                    content = ""
                }
            end,
            ENDLINE = function(match)
                pushToken {
                    kind = "ENDLINE",
                    content = "",
                    indent = match.tokens[#match.tokens].indent
                }
                inStatementContext = true
            end,
            COMMENT = function(match)
                local indent = 0
                if match.tokens and #match.tokens > 0 then
                    indent = match.tokens[#match.tokens].indent
                end

                pushToken {
                    kind = "ENDLINE",
                    content = "",
                    indent = indent
                }
                inStatementContext = true
            end,
            MACRO_CALL_BEGIN = function(match)
                pushToken {
                    kind = "MACRO_CALL_BEGIN",
                    content = match.variable.content
                }
            end,
            VARIABLE = function(match)
                pushToken {
                    kind = "VARIABLE",
                    content = match.variable.content
                }
            end,
            LUA_EXPRESSION = function(match)
                local content = {}
                for _, token in ipairs(match.content) do
                    table.insert(content, token.content)
                end
                pushToken {
                    kind = "LUA_EXPRESSION",
                    content = table.concat(content, "", 2, #content-1) -- remove braces
                }
            end,
            USER_SPACE = function(match)
                local content = match.content.content
                if content == "\\s" then
                    content = " "
                end
                pushToken {
                    kind = "TEXT",
                    content = content
                }
            end,
            ESCAPE = function(match)
                pushToken {
                    kind = "TEXT",
                    content = match.content.content:sub(2, -1)
                }
            end,
            ESCAPE_ALONE = function(match)
                pushToken {
                    kind = "TEXT",
                    content = "\\\\"
                }
            end,
            RPAR = function(match)
                pushToken {
                    kind    = "RPAR",
                    content = ""
                }
            end,
            COMMA = function(match)
                pushToken {
                    kind    = "COMMA",
                    content = ""
                }
            end
        }

        local function testAllPatterns(patternList)
            for _, patternInfo in ipairs(patternList) do
                local match = plume.matchPattern(tokens, pos, patternInfo.pattern)
                if match then
                    return patternInfo.name, match
                end
            end
        end

        -- Main parsing loop
        while pos <= #tokens do
            local patternName, match
            if inStatementContext then
                patternName, match = testAllPatterns(statementPatternList)
            end

            if not patternName then
                inStatementContext = false
                patternName, match = testAllPatterns(expressionPatternList)
            end

            if patternName then

                captureBeginPos = pos
                pos = pos + match.length
                captureEndPos = pos-1
                
                popText()

                statementHandler[patternName](match)

                if inStatementContext then
                    while tokens[pos] and tokens[pos].kind == "SPACE" do
                        pos = pos + 1
                    end
                end
            else
                captureEndPos = pos

                pushText(tokens[pos].content)
                pos = pos + 1
            end

        end

        popText()

        return result
    end
end

end

plume_files['plume-engine/beautifier'] = function ()


--- Formats Lua code with automatic indentation based on syntax patterns.

return function(plume)

    plume.beautifier = function(code)
        local formatted_lines = {}
        local indent_level = 0

        -- Pattern configuration for indentation changes
        local INDENT_RULES = {
            decrement = {  -- Rules for decreasing indentation BEFORE processing line
                { pattern = "^},?$"     },  -- Closing brace (with optional comma)
                { pattern = "end"       },  -- End of block
                { pattern = "return $"  },  -- Return statement (simplistic match)
                { pattern = "^else"     },  -- Else/elseif keyword at line start
                { pattern = "^%)+$"     }   -- Lines ending with closing parentheses
            },
            increment = {  -- Rules for increasing indentation AFTER processing line 
                { pattern = "{$"        },  -- Opening brace
                { pattern = "function"  },  -- Function declaration
                { pattern = "return $"  },  -- Match returns with block creation
                { pattern = "^for"      },  -- Loop structures
                { pattern = "^if"       },  -- Conditional blocks
                { pattern = "^else"     },  -- Else block (indent after)
                { pattern = "^while"    },  -- While loop
                { pattern = "%($"       }   -- Opening parenthesis (basic match)
            }
        }

        --- Checks if a line matches indentation rules while ignoring excluded patterns
        -- @param line: Raw input line to check
        -- @param rule: Rule table containing pattern and optional exclude
        -- @return: boolean indicating match status
        local function match_line(line, rule)
            return line:match(rule.pattern) and not (rule.exclude and line:match(rule.exclude))
        end

        -- Main processing loop
        for line in (code.."\n"):gmatch("([^\n]*)\n") do
            -- Process DECREMENT rules before adding line
            for _, rule in ipairs(INDENT_RULES.decrement) do
                if match_line(line, rule) then
                    indent_level = math.max(indent_level - 1, 0)  -- Prevent negative indentation
                    break  -- Only apply first matching decrement rule
                end
            end

            -- Add line with current indentation
            table.insert(formatted_lines, string.rep("\t", indent_level) .. line:gsub("^%s+", ""))

            -- Process INCREMENT rules after adding line
            for _, rule in ipairs(INDENT_RULES.increment) do
                if match_line(line, rule) then
                    indent_level = indent_level + 1
                    break  -- Only apply first matching increment rule
                end
            end
        end

        return table.concat(formatted_lines, "\n")
    end
end
end

plume_files['plume-engine/error'] = function ()


return function (plume)
    ---Finds the source line containing the error position and formats context information
    ---@param source table Source metadata containing sourceFile, absolutePosition, and filename
    ---@return string Formatted error context string with filename, line number, and line content
    local function getLine(source)
        local pos = 0
        local lineCount = 0
        local capturedLine

        -- Iterate through lines while tracking cumulative position to find the error line
        for line in (source.sourceFile.."\n"):gmatch('([^\n]*)\n') do
            lineCount = lineCount + 1
            pos = pos + #line + 1  -- +1 accounts for newline character
            if pos >= source.absolutePosition then
                -- Remove leading whitespace for cleaner error display
                capturedLine = line:gsub('^%s*', '')
                break
            end
        end

        return string.format("File %s, line n°%i :\n    %s", source.filename:sub(2, -1), lineCount, capturedLine)
    end

    ---Throws a contextual error with source code location information
    ---@param source table Source metadata
    ---@param msg string Error message to display
    function plume.error (source, msg)
        local line = getLine(source)
        error (msg .. "\n" .. line, -1)  -- -1 level hides this function from stack trace
    end

    ---Handles type mismatch errors within blocks
    ---@param source table Source metadata
    ---@param expectedType string Expected expression type
    ---@param givenType string Actually provided type
    function plume.mixedBlockError (source, expectedType, givenType)
        plume.error(source, string.format(
            "mixedBlockError : Given the previous expressions in this block, it was expected to be of type %s, but a %s expression has been supplied",
            expectedType, givenType
        ))
    end

    function plume.convertLuaError(msg, map)
        local result = {}
        local filename, noline, message = msg:match('(.-):(.-):%s*(.*)')

        table.insert(result, "Error : ")
        table.insert(result, message)
        local tokens = map[tonumber(noline)]

        local lineFound = false

        for _, token in ipairs(tokens) do
            if token.sourceToken and token.sourceToken.source then
                table.insert(result, "\n")
                table.insert(result, getLine(token.sourceToken.source))
                table.insert(result, "\n(Error handling is still under development, so locating the lua error in the Plume code may be imprecise.)")
                lineFound = true
                break
            end
        end

        if not lineFound then
            table.insert(result, "\nUnable to locate the error in a Plume file.")
        end
        
        return table.concat(result)
    end
end
end

plume_files['plume-engine/init'] = function ()


local plume = {}

plume._VERSION = "Plume🪶 0.20"

-- Load core components using dependency injection pattern
require "plume-engine/utils"         (plume)
require "plume-engine/patterns"      (plume)
require "plume-engine/tokenizer"     (plume)
require "plume-engine/parser/parser" (plume)
require "plume-engine/makeAST"       (plume)
require "plume-engine/plume"         (plume)
require "plume-engine/luaTranspiler" (plume)
require "plume-engine/error"         (plume)
require "plume-engine/beautifier"    (plume)
require "plume-engine/plumeDebug"    (plume)

--- Execute Plume code through full processing pipeline
--- @param text string Input Plume code to execute
--- @return any Result of executed code
function plume.execute(text, filename)
    -- Pipeline stages: Text -> Tokens -> AST -> Lua code -> Formatted code
    local tokens, ast, code, map
    filename = filename or "@<string>"

    tokens    = plume.tokenize(text, filename)
    tokens    = plume.parse(tokens)
    ast       = plume.makeAST(tokens)
    code, map = plume.transpileToLua(ast)
    code      = plume.beautifier(code)

    -- Compile generated Lua code with custom environment
    -- And create isolated environment that falls back to global namespace
    -- while exposing plume standard library explicitly

    local compiledFunction, errorMessage
    local env = setmetatable({
        plume = plume.plumeStdLib
    }, {__index = _G})

    if setfenv then
        compiledFunction, errorMessage = loadstring(code, filename)

        if compiledFunction then
            setfenv(compiledFunction, setmetatable({}, {__index = env}))
        end
    else
        compiledFunction, errorMessage = load(code, filename, nil, env)
    end
    
    if not compiledFunction then
        error(plume.convertLuaError(errorMessage, map), -1)
    end

    local sucess, result = pcall(compiledFunction)
    
    if sucess then
        return result
    else
        error(plume.convertLuaError(result, map), -1)
    end
end

return plume
end

plume_files['plume-engine/luaTranspiler'] = function ()


return function(plume)

    local contains           = plume.utils.containsWord
    local STATEMENTS         = "FOR ASSIGNMENT LOCAL_ASSIGNMENT IF ELSE ELSEIF WHILE MACRO LOCAL_MACRO RETURN BREAK"

    local transpileToLua

    ---Main transpilation entry point
    plume.transpileToLua = function(ast, luaVersion)

        if not luaVersion then
            if jit then
                luaVersion = "JIT"
            else
                luaVersion = _VERSION:match('%S+$')
            end
        end

        local map = {{}}

        local function newline ()
            table.insert(map, {})
            return "\n"
        end

        local function use (token)
            table.insert(map[#map], token)
        end

        local insertAll

        if table.move then
            function insertAll(t1, t2)
                table.move(t2, 1, #t2, #t1 + 1, t1)
            end
        else
            function insertAll(t1, t2)
                for i = 1, #t2 do
                    table.insert(t1, t2[i])
                end
            end
        end
        local insert = table.insert

        local function parseChildren (node)
            local result = {}

            local onlyValues      = true
            local firstValueFound = false
            local valueCount = 0
            local acc        = {}

            for _, child in ipairs(node.children) do
                local isStatement = contains(STATEMENTS, child.kind)
                -- local content = transpileToLua(child)
                if child.returnType == "NIL" or isStatement then
                    onlyValues = false

                    if not firstValueFound then
                        if #acc > 0 or isStatement then
                            table.insert(result, {store=true, kind="nodeList", content=acc})
                            firstValueFound = true
                        end
                    end

                    table.insert(result, {store=false, kind="node", content=child})

                    -- Cannot count inside constrole strcutre
                    if contains("IF ELSEIF ELSE FOR WHILE", child.kind) then
                        valueCount = -1    
                    end

                elseif not firstValueFound then
                    if valueCount ~= -1 then
                        valueCount = valueCount+1
                    end
                    table.insert(acc, child)
                else
                    if valueCount ~= -1 then
                        valueCount = valueCount+1
                    end
                    table.insert(result, {store=true, kind="node", content=child})
                end
            end

            if not firstValueFound then
                if #acc > 0 then
                    table.insert(result, {store=true, kind="nodeList", content=acc})
                end
            end

            if #result == 0 then
                onlyValues = false
            end

            return result, onlyValues, valueCount
        end

        ---Transpiles child nodes of an AST element into executable Lua code
        ---Handles value accumulation and control flow wrapping
        ---@param node AST node to process
        ---@param wrapInFunction Whether to wrap in IIFE for scope isolation
        ---@param shouldInitAccumulator Whether to create temporary value storage
        ---@param forceReturn Whether to force return statement at end
        ---@return table List of generated code lines
        local function transpileChildren (node, wrapInFunction, shouldInitAccumulator, forceReturn)

            if #node.children == 0 and contains("LIST_ITEM HASH_ITEM TEXT VALUE RETURN ASSIGNMENT", node.kind) then
                return {'""'}
            end

            local infos, onlyValues, valueCount = parseChildren(node)

            if onlyValues and shouldInitAccumulator then
                local result = {}
                local wrapInTable  = (node.returnType == "TABLE") or valueCount>2
                local concat       = (node.returnType == "TEXT") and valueCount>2
                local directConcat = (node.returnType == "TEXT") and valueCount==2

                if forceReturn then
                    insert(result, newline())
                    insert(result, "return ")
                end

                if concat then
                    insert(result, "__plume_concat ")
                end

                if wrapInTable then
                    insert(result, "{")
                end

                if directConcat then
                    insert(result, "(")
                    insert(result, newline())
                end

                if wrapInTable then
                    insert(result, newline())
                end

                for i, content in ipairs(infos[1].content) do
                    insertAll(result, transpileToLua(content))
                    if i < #infos[1].content then
                        if directConcat then     
                            insert(result, newline())
                            insert(result, ".. ")
                        else
                            insert(result, ", ")
                            insert(result, newline())
                        end
                    end
                end

                if directConcat then
                    insert(result, newline())
                    insert(result, ")")
                 end

                if wrapInTable then
                    insert(result, newline())
                    insert(result, "}")
                end

                return result
            else
                local result = {}

                if wrapInFunction then
                    insert(result, "(function()")
                end

                local firstValueFound = false
                local alreadyReturn   = false
                for index, info in ipairs(infos) do
                    if info.store then
                        local values = info.content
                        if info.kind == "node" then
                            values = {values}
                        end

                        if valueCount == 1 and shouldInitAccumulator and #values>0 then

                            if index == #infos then
                                alreadyReturn = true
                                insert(result, newline())
                                insert(result, "return ")
                            elseif node.returnType ~= "VALUE" then
                                insert(result, newline())
                                insert(result, "local __plume_temp = ")
                            end

                            if node.returnType == "TABLE" then
                                insert(result, "{")
                                insert(result, newline())
                            end

                            insertAll(result, transpileToLua(values[1]))

                            if node.returnType == "TABLE" then
                                insert(result, newline())
                                insert(result, "}")
                            end
                            
                        else
                            if firstValueFound or (not shouldInitAccumulator) then
                                for _, value in ipairs(values) do
                                    insert(result, newline())
                                    insert(result, "table.insert(__plume_temp, ")
                                    insertAll(result, transpileToLua(value))
                                    insert(result, ")")
                                end
                            elseif #values > 0  then
                                firstValueFound = true
                                insert(result, newline())
                                insert(result, "local __plume_temp = {")
                                for _, value in ipairs(values) do
                                    insert(result, newline())
                                    insertAll(result, transpileToLua(value))
                                    insert(result, ", ")
                                end
                                insert(result, newline())
                                insert(result, "}")
                            elseif valueCount ~= 0 and (valueCount == -1 or #values > 0) then
                                firstValueFound = true
                                if node.returnType ~= "VALUE" then
                                    insert(result, newline())
                                    insert(result, "local __plume_temp = {}")
                                end
                            end
                        end
                    else
                        insertAll(result, transpileToLua(info.content))
                    end
                end

                if (wrapInFunction or forceReturn) and not alreadyReturn then
                    if node.returnType == "TEXT" and (valueCount ~= 1 or not shouldInitAccumulator) then
                        insert(result, newline())
                        if valueCount == 0 then
                            insert(result, "return \"\"")
                        else
                            insert(result, "return __plume_concat (__plume_temp)")
                        end
                    elseif node.returnType ~= "NIL" and node.returnType ~= "VALUE" then
                        insert(result, newline())
                        if valueCount == 0 then
                            insert(result, "return {}")
                        else
                            insert(result, "return __plume_temp")
                        end
                    end
                end

                if wrapInFunction then
                    insert(result, newline())
                    insert(result, "end)()")
                end

                return result
            end        
        end

        local function handlerMACRO (node, islocal, addNewline)
            local parameters = node.children[1]
            local body       = node.children[2]

            local result = {}
            
            if addNewline then
                insert(result, newline())
            end

            use(node)

            if islocal then
                insert(result, "local ")
            end

            if node.content and #node.content > 0 then
                insert(result, node.content)
                insert(result, " = ")
            end

            insert(result, "function (")
            for i, child in ipairs(parameters.children) do
                if child.kind == "LIST_ITEM" then
                    table.insert(result, child.content)
                    if i < #parameters.children then
                        table.insert(result, ",")
                    end
                end
            end
            insert(result, ")")
            insertAll(result, transpileChildren (body, false, true, true))
            insert(result, newline())
            insert(result, "end")

            return result
        end

        -- AST node type to handler mapping
        local tokenHandlers = {
            BLOCK = function (node)
                use(node)
                local mainBlock = (node.indent or 0) >= 0
                local result = transpileChildren (node, mainBlock, true, true)

                return result
            end,

            MACRO_CALL = function (node)
                local inlineArgs   = node.children[1]
                local extendedArgs = node.children[2]

                if #inlineArgs.children==0 then
                    inlineArgs = nil
                end

                if extendedArgs and #extendedArgs.children==0 then
                    extendedArgs = nil
                end

                if not inlineArgs and not extendedArgs then
                    return {node.content, "()"}
                elseif not extendedArgs then
                    local result = {node.content, "(__plume_unpack("}
                    insert(result, newline())
                    insertAll(result, transpileChildren (inlineArgs, true, true))
                    insert(result, newline())
                    insert(result, "))")
                    return result
                elseif not inlineArgs then
                    if extendedArgs.returnType == "TABLE" then
                        local result = {node.content, "(__plume_unpack(", newline()}
                        insertAll(result, transpileChildren (extendedArgs, true, true))
                        insert(result, newline())
                        insert(result, "))")
                        return result
                    else
                        local result = {node.content, "(", newline()}
                        insertAll(result, transpileChildren (extendedArgs, true, true))
                        insert(result, newline())
                        insert(result, ")")
                        return result
                    end
                else
                    local inline   = transpileChildren (inlineArgs, true, true)
                    local extended = transpileChildren (extendedArgs, true, true)

                    local result = {newline(), node.content, "(__plume_unpack("}
                    insert(result, newline())
                    insert(result, "plume.table.merge(")
                    insert(result, newline())
                    insertAll(result, inline)
                    insert(result, ",")
                    insert(result, newline())
                    if extendedArgs.returnType == "TEXT" then
                        insert(result, "{")
                    end
                    insertAll(result, extended)
                    if extendedArgs.returnType == "TEXT" then
                        insert(result, newline())
                        insert(result, "}")
                    end

                    insert(result, newline())
                    insert(result, ")")
                    insert(result, newline())
                    insert(result, "))")

                    return  result
                    
                end
            end,

            ASSIGNMENT = function (node)
                local result = {newline(), node.content, " = "}
                use(node)
                insertAll(result, transpileChildren (node, true, true))
                return result
            end,

            LOCAL_ASSIGNMENT = function (node)
                local result = {newline(), "local ", node.content, " = "}
                use(node)
                insertAll(result, transpileChildren (node, true, true))
                return result
            end,

            -- VOID = function (node)
            --     local result = transpileChildren (node, true, true)

            --     return "__plume_void = " .. table.concat(result, "\n")
            -- end,

            MACRO = function (node)
                return handlerMACRO(node, false, true)
            end,

            LOCAL_MACRO = function (node)
                return handlerMACRO(node, true, true)
            end,

            INLINE_MACRO = function (node)
                return handlerMACRO(node)
            end,

            LIST_ITEM = function (node)
                use(node)
                return transpileChildren (node, true, true)
            end,

            HASH_ITEM = function (node)
                local result = {node.content, " = "}
                use(node)
                insertAll(result, transpileChildren (node, true, true))
                return result
            end,

            RETURN = function (node)
                local result = {newline(), "return "}
                use(node)
                insertAll(result, transpileChildren (node, true, true))
                return result
            end,

            FOR = function (node)
                local result = {newline()}
                use(node)
                insertAll(result, {"for", node.content, " do"})
                insertAll(result, transpileChildren (node, false, false))
                insert(result, newline())
                insert(result, "end")
                return result
            end,

            WHILE = function (node)
                local result = {newline()}
                use(node)
                insertAll(result, {"while", node.content, " do"})
                insertAll(result, transpileChildren (node, false, false))
                insert(result, newline())
                insert(result, "end")
                return result
            end,

            IF = function (node)
                local result = {newline()}
                use(node)
                insertAll(result, {"if", node.content, " then"})
                insertAll(result, transpileChildren (node, false, false))
                if not node.noend then
                    insert(result, newline())
                    insert(result, "end")
                end
                return result
            end,

            ELSEIF = function (node)
                local result = {newline()}
                use(node)
                insertAll(result, {"elseif", node.content, " then"})
                insertAll(result, transpileChildren (node, false, false))
                if not node.noend then
                    insert(result, newline())
                    insert(result, "end")
                end
                return result
            end,

            ELSE = function (node)
                local result = {newline()}
                use(node)
                insertAll(result, {"else"})
                insertAll(result, transpileChildren (node, false, false))
                insert(result, newline())
                insert(result, "end")
                return result
            end,

            BREAK = function (node)
                local result = {newline()}
                use(node)
                insert(result, "break")
                return result
            end,

            TEXT = function (node)
                use(node)
                if tonumber(node.content) then
                    return {node.content}
                else
                    return {'"', node.content:gsub('"', '\\"'), '"'}
                end
            end,

            VARIABLE = function (node)
                use(node)
                return {node.content}
            end,

            LUA_EXPRESSION = function (node)
                use(node)
                return {node.content}
            end
        }

    
        function transpileToLua(ast)
            if tokenHandlers[ast.kind] then
                return tokenHandlers[ast.kind](ast)
            else
                error("NIY " .. ast.kind)
            end
        end

        local result = {"local __plume_concat = table.concat"}

        table.insert(result, newline())
        if contains("5.1 JIT", luaVersion) then
            table.insert(result, "local __plume_unpack = unpack")
        else
            table.insert(result, "local __plume_unpack = table.unpack")
        end

        insertAll(result, transpileToLua(ast))
        return table.concat(result), map
    end
end
end

plume_files['plume-engine/makeAST'] = function ()


-- AST construction module
-- Transforms token stream into nested hierarchical structure representing program logic
return function (plume)
    local contains = plume.utils.containsWord

    -- Main parser function
    plume.makeAST = function(tokens)
        local context         = {} -- Node hierarchy stack (path from root to current node)
        local pos             = 0  -- Current position in token stream
        local currentIndent   = 0  -- Track indentation for block scoping (Python-like)
        local insideMacroCall = 0  -- Track nested macro call depth

        --- Propagates return type constraints through parent scopes
        --- Enforces type consistency in code generation paths
        ---@param token table Trigger token for error reporting
        ---@param kind string Expected return type ('TEXT' or 'TABLE')
        ---@param context table Current context stack
        local function setReturnType(token, kind)
            for i=#context, 1, -1 do
                -- Ensure parent control structures maintain consistent return types
                if context[i].returnType ~= "NIL" and context[i].returnType ~= kind then
                    plume.mixedBlockError(token.source, context[i].returnType, kind)
                end

                context[i].returnType = kind
                -- Stop propagation at non-control flow nodes
                if not contains("FOR IF ELSE ELSEIF WHILE", context[i].kind) then
                    break
                end
            end
        end

        --- Creates terminal node, merging consecutive text nodes
        ---@param sourceToken table|nil Originating token for error tracking
        ---@param kind string Node type identifier
        ---@param content string|any Node payload (text content, variable name, etc)
        local function pushChild(sourceToken, kind, content)
            local current = context[#context]
            local last = current.children[#current.children]

            -- Merge adjacent text nodes to reduce AST size
            if kind == "TEXT" and last and last.kind == "TEXT" then
                last.content = last.content .. content
            else
                table.insert(current.children, {
                    kind        = kind,
                    content     = content,
                    sourceToken = sourceToken  -- Track origin for debug purposes
                })
            end
        end

        --- Creates new parent node and pushes onto context stack
        ---@param sourceToken table|nil Originating token
        ---@param kind string Node type identifier
        ---@param indent integer Scope nesting level
        ---@param content any Context-specific metadata
        local function pushContext(sourceToken, kind, indent, content)
            table.insert(context, {
                kind        = kind,
                returnType  = "NIL",   -- Determined during type propagation
                indent      = indent,      -- Controls scoping in popContext
                children    = {},        -- Child nodes
                content     = content,    -- Type-specific data (e.g., macro name)
                sourceToken = sourceToken
            })
        end

        --- Pops contexts when exiting scopes based on indentation
        ---@param indent integer Current indentation level after ENDLINE
        ---@param limit integer|nil Maximum contexts to pop (optional)
        local function popContext(indent, limit)
            -- Close over-indented contexts when returning to outer scope
            for i=#context, 1, -1 do
                if context[i].indent > indent then
                    local lastContext = context[i]
                    local parentContext = context[i-1]
                    
                    -- Validate control flow structure
                    if contains("ELSE ELSEIF", lastContext.kind) then
                        local lastChildren = parentContext.children[#parentContext.children]
                        if lastChildren and contains("IF ELSEIF", lastChildren.kind) then
                            lastChildren.noend = true  -- Mark as chained conditional
                        else
                            error(lastContext.kind .. " must follow a if or elseif")
                        end

                    -- Force list and hash item to have a type
                    elseif contains("LIST_ITEM HASH_ITEM", lastContext.kind) and lastContext.returnType == "NIL" then
                         lastContext.returnType = "TEXT" 
                    end

                    -- Move closed context to parent's children
                    table.insert(parentContext.children, lastContext)
                    table.remove(context)
                else
                    break  -- Stop at first context with <= indent
                end
                
                -- Apply pop limit if specified
                if limit then
                    limit = limit - 1
                    if limit == 0 then break end
                end
            end
        end

        --- Captures macro arguments until MACRO_ARG_END token
        local function captureMacroArgs()
            pushContext(nil, "MACRO_ARG_TABLE", currentIndent+1)
            while pos < #tokens do
                pos = pos+1
                local token = tokens[pos]

                if token.kind == "MACRO_ARG_END" then
                    break
                else
                    pushChild(token, token.kind, token.content)
                end
            end
            popContext(-1, 1)
        end

        --- Closes inline macro parameter contexts when encountering RPAR
        local function closeMacroInlineParameters()
            local antelast = context[#context-1]
            
            -- Handle inline parameter lists like macro(arg1, arg2)
            if antelast and antelast.kind == "MACRO_CALL_INLINE_PARAMETERS" then
                local lastArg = context[#context]

                -- Remove empty list items
                if #lastArg.children == 0 then
                    table.remove(context)
                else
                    popContext(-1, 1)
                end

                popContext(-1, 1)  -- Close MACRO_CALL_INLINE_PARAMETERS
                insideMacroCall = insideMacroCall-1
            end
        end

        -- Initialize with root block
        pushContext(nil, "BLOCK", -1)

        -- Begin token processing loop
        while pos < #tokens do
            pos = pos + 1
            local token = tokens[pos]
            local current = context[#context]

            -- Handle content nodes
            if contains("TEXT VARIABLE LUA_EXPRESSION ", token.kind) then
                setReturnType(token, "TEXT", context)
                pushChild(token, token.kind, token.content)

            -- Macro call initiation
            elseif contains("MACRO_CALL_BEGIN", token.kind) then
                insideMacroCall = insideMacroCall + 1
                setReturnType(token, "TEXT")
                
                pushContext  (token, "MACRO_CALL", currentIndent+1, token.content)
                setReturnType(token, "TEXT")
                
                pushContext  (token, "MACRO_CALL_INLINE_PARAMETERS", currentIndent+1)
                setReturnType(token, "TABLE")
                
                pushContext  (token, "LIST_ITEM", currentIndent+1)

            -- Right parenthesis handling
            elseif contains("RPAR", token.kind) then
                if insideMacroCall > 0 then
                    closeMacroInlineParameters()

                    -- Detect extended parameters (multi-line)
                    if tokens[pos+1] and tokens[pos+1].kind == "ENDLINE" then
                        pushContext(token, "MACRO_CALL_EXTENDED_PARAMETERS", currentIndent+1)
                    else
                        popContext(-1, 1)
                    end
                else
                    pushChild(token, "TEXT", ")")
                end

            -- Parameter list comma handling
            elseif contains("COMMA", token.kind) then
                if insideMacroCall > 0 then
                    popContext(-1, 1)  -- Close current list item
                    pushContext(token, "LIST_ITEM", currentIndent+1)  -- New parameter
                else
                    pushChild(token, "TEXT", ",")
                end

            -- Variable assignment constructs
            elseif token.kind == "ASSIGNMENT" then
                pushContext(token, "ASSIGNMENT", currentIndent+1, token.content)

            elseif token.kind == "LOCAL_ASSIGNMENT" then
                pushContext(token, "LOCAL_ASSIGNMENT", currentIndent+1, token.content)
            
            -- List and hash structures
            elseif token.kind == "LIST_ITEM" then
                setReturnType(token, "TABLE")

                pushContext(token, "LIST_ITEM", currentIndent+1)

            elseif token.kind == "HASH_ITEM" then
                setReturnType(token, "TABLE")

                pushContext(token, "HASH_ITEM", currentIndent+1, token.content)
            
            -- Line ending processing
            elseif token.kind == "ENDLINE" then
                closeMacroInlineParameters()
                currentIndent = token.indent or currentIndent
                popContext(currentIndent)  -- Close completed contexts

            -- Control flow constructs
            elseif contains("FOR IF ELSEIF ELSE WHILE", token.kind) then
                pushContext(token, token.kind, currentIndent+1, token.content)

            -- Return statement handling
            elseif contains("RETURN", token.kind) then
                setReturnType(token, "VALUE", context)
                pushContext(token, token.kind, currentIndent+1, token.content)

            -- Break for loops
            elseif contains("BREAK", token.kind) then
                -- Todo : check if we are inside a loop
                pushChild(token, "BREAK", "")

            -- Macro definitions
            elseif contains("MACRO LOCAL_MACRO", token.kind) then
                pushContext(token, token.kind, currentIndent+1, token.content)
                captureMacroArgs()
                pushContext(token, "MACRO_BODY", currentIndent+1)

            -- Inline macros (value-producing)
            elseif contains("INLINE_MACRO", token.kind) then
                setReturnType(token, "VALUE")
                pushContext(token, token.kind, currentIndent+1, token.content)
                captureMacroArgs()
                setReturnType(token, "VALUE")
                pushContext(token, "MACRO_BODY", currentIndent+1)
                
            else
                error("Not Implemented Yet: " .. token.kind)
            end
        end

        -- Finalize root node
        popContext(-1)
        return context[1]
    end
end

end

plume_files['plume-engine/patterns'] = function ()


return function (plume)
    --- Checks if a specific token field matches pattern constraints
    ---@param token table Token to validate
    ---@param patternInfos table Constraints for field matching
    ---@param field string Token field to check ('kind' or 'content')
    ---@return boolean
    function plume.checkFieldPattern(token, patternInfos, field)
        -- No constraint means automatic match
        if not patternInfos[field] then
            return true
        end

        if not token then
            return false
        end

        -- Direct value comparison for string patterns
        if type(patternInfos[field]) == "string" then
            return token[field] == patternInfos[field]
        else -- Array of allowed values
            for _, content in ipairs(patternInfos[field]) do
                if content == token[field] then
                    return true
                end
            end
            return false
        end
    end

    --- Validates token against combined pattern requirements
    ---@param token table Token to check
    ---@param patternInfos table Combined pattern specifications
    ---@return boolean
    function plume.checkPattern(token, patternInfos)
        -- Handle negation through recursive call
        if patternInfos.neg then
            return not plume.checkPattern(token, patternInfos.neg)
        else
            -- Must satisfy both field constraints
            return plume.checkFieldPattern(token, patternInfos, "kind")
               and plume.checkFieldPattern(token, patternInfos, "content")
        end
    end

    --- Matches token sequence against complex pattern structure
    ---@param tokens table[] Array of tokens to process
    ---@param pos integer Starting index (1-based)
    ---@param patternList table[] Sequence of pattern specifications
    ---@return table|boolean,table Capture table with results and success status
    function plume.matchPattern(tokens, pos, patternList)
        local capture = {length = 0}  -- Stores captured tokens and total matched count
        local patternPos = 0          -- Current position in pattern list
        local tokenPos = pos - 1      -- Current token index (adjusted for 1-based Lua arrays)
        
        while true do
            patternPos = patternPos + 1
            tokenPos = tokenPos + 1

            local token = tokens[tokenPos]
            local infos = patternList[patternPos]

            -- Successful match when pattern list is exhausted
            if not infos then
                break
            end

            -- Fail if tokens exhausted before pattern completion
            if not token and not infos.optional then
                return false
            end

            local captureCount = 0

            -- Handle repeating captures (zero or more occurrences)
            if infos.multipleCapture then
                local captureList = {}
                -- Consume all consecutive matching tokens
                while token and plume.checkPattern(token, infos) do
                    table.insert(captureList, token)
                    tokenPos = tokenPos + 1
                    token = tokens[tokenPos]
                end 

                captureCount = #captureList
                -- Fail if mandatory capture has zero matches
                if captureCount > 0 then
                    tokenPos = tokenPos - 1  -- Adjust for last non-matching token
                elseif not infos.optional then
                    return false
                end

                if infos.name then
                    capture[infos.name] = captureList
                end
            elseif infos.braced then
                -- Handle nested bracket structures
                if not plume.checkPattern(token, infos.braced.open) then
                    return false
                end

                local captureList = {}
                local depth = 0    -- Bracket nesting level
                local offset = 0   -- Token lookahead offset

                -- Capture until matching closing bracket
                while tokens[tokenPos + offset] do
                    local current_token = tokens[tokenPos + offset]

                    if plume.checkPattern(current_token, infos.braced.open) then
                        depth = depth + 1
                    elseif plume.checkPattern(current_token, infos.braced.close) then
                        depth = depth - 1
                    end

                    table.insert(captureList, current_token)

                    if depth == 0 then
                        break
                    end
                    offset = offset + 1
                end

                -- Check for unbalanced brackets
                if depth > 0 then
                    return false
                end

                if infos.name then
                    capture[infos.name] = captureList
                end

                captureCount = #captureList
                tokenPos = tokenPos + offset
            else
                -- Single token matching logic
                local found = plume.checkPattern(token, infos)

                if found then
                    if infos.name then
                        capture[infos.name] = token  -- Store named capture
                    end
                    captureCount = 1
                elseif infos.optional then
                    -- Create placeholder for optional captures
                    captureCount = 0
                    tokenPos = tokenPos - 1  -- Maintain position
                    if infos.name then
                        capture[infos.name] = {content = "", kind = "EMPTY"}
                    end
                else
                    return false  -- Non-optional pattern failed
                end
            end

            capture.length = capture.length + captureCount
        end
        return capture
    end
end

end

plume_files['plume-engine/plume'] = function ()
return function(plume)
    plume.plumeStdLib = {table={}}

    if table.move then
        function plume.plumeStdLib.table.merge(...)
            local result = {}
            local index = 1

            for i = 1, select('#', ...) do
                local tbl = select(i, ...)
                if tbl then
                    local len = #tbl
                    table.move(tbl, 1, len, index, result)
                    index = index + len
                end
            end

          return result
        end
    else
        function plume.plumeStdLib.table.merge(...)
            local result = {}
            local index = 1

            for _, tbl in ipairs({...}) do
                if tbl then
                    for j = 1, #tbl do
                        result[index] = tbl[j]
                        index = index + 1
                    end
                end
            end

            return result
        end
    end
end

    end

    end

    plume.printLexResult = function(tokens)

        for _, token in ipairs(tokens) do
            local output = string.format(
                "%s%s %s",
                createIndentation(currentIndent),
                token.kind,
                formatContent(token.content)
            )
            print(output)

        end

        if node.children then
            print(indent..node.returnType .. " " .. node.kind .. ': ' .. (node.content or ""))

            for _, child in ipairs(node.children) do
                plume.printParseResult(child, indent.."\t")
            end
        else
            print(indent..node.kind .. ': ' .. node.content)
        end
    end

plume_files['plume-engine/tokenizer'] = function ()

--- Lexical analyzer module for Plume language processing

-- Ordered list of token patterns with match priority (first match takes precedence)
-- Patterns use Lua string patterns with following notable behaviors:
local tokenPatterns = {
    -- Structural tokens (order-sensitive syntax elements)
    {name = "EVAL",    pattern = "%$"},    -- Expression evaluation marker
    {name = "NEWLINE", pattern = "\r?\n"}, -- Line endings (CRLF or LF)
    {name = "SPACE",   pattern = "[ \t]"}, -- Individual whitespace character
    {name = "DASH",    pattern = "%-"},    -- List item identifier
    {name = "COLON",   pattern = ":"},     -- Type/Value separator
    {name = "EQUAL",   pattern = "="},     -- Assignment operator
    {name = "ENDLINE", pattern = ";"},     -- Statement terminator
    {name = "COMMA",   pattern = ","},     -- List/item separator
    {name = "LPAR",    pattern = "%("},    -- Expression group start
    {name = "RPAR",    pattern = "%)"},    -- Expression group end
    {name = "QUOTE",   pattern = '"'},     -- String literal delimiter
    {name = "COMMENT", pattern = '//'},    -- Line comment
    -- Value tokens
    {name = "ESCAPE", pattern = "\\[-:=;,%(%)/snt]"},    -- Escaped character (any following character)
    {name = "ESCAPE_ALONE", pattern = "\\"},    -- Escaped character (any following character)
    {name = "TEXT",  pattern = "[a-zA-Z%._][a-zA-Z0-9%._]*"}, -- Alphanumeric identifier
    {name = "SYMBOL", pattern = "."}       -- Catch-all for unmatched single characters
}

-- Prepending ^ makes pattern match from current position only
for _, tp in ipairs(tokenPatterns) do
    tp.anchored = "^" .. tp.pattern
end

return function(plume)
    --- Tokenizes input text into annotated tokens with source metadata
    -- Handles indentation-based block structure through NEWLINE tracking
    -- @param text string Input source code to analyze
    -- @param filename? string Optional source identifier for error reporting
    -- @return table[] Sequence of token objects with:
    --         kind: Token type identifier
    --         content: Matched text segment
    --         source: Source location metadata
    --         indent: (NEWLINE only) Subsequent indentation level
    plume.tokenize = function(text, filename)
        local pos = 1 -- Current parsing position in source text
        local tokens = {} -- Accumulated token stream

        -- Factory for source metadata objects
        local source = function(length)
            return {
                filename = filename,
                sourceFile = text, -- NOTE: Storing entire text may be memory-intensive for large files
                absolutePosition = pos, -- Starting position of token
                length = length -- Token content length
            }
        end

        -- Detect standard indentation from first line's leading whitespace
        local indentPattern = text:match("\n([ \t]+)")
        local indentAnchored = indentPattern and "^" .. indentPattern or nil

        -- Main tokenization loop
        while pos <= #text do
            local matched = false

            -- Attempt pattern matches in priority order
            for _, tokenPattern in ipairs(tokenPatterns) do
                local start, finish = text:find(tokenPattern.anchored, pos)
                if start then
                    local content = text:sub(start, finish)
                    table.insert(
                        tokens,
                        {
                            kind = tokenPattern.name,
                            content = content,
                            source = source(finish - start + 1)
                        }
                    )
                    pos = finish + 1
                    matched = true

                    -- Handle indentation tracking after newlines
                    if tokenPattern.name == "NEWLINE" and indentAnchored then
                        local indent = 0
                        -- Count consecutive standard indent units
                        while true do
                            local s, e = text:find(indentAnchored, pos)
                            if s == pos then
                                pos = e + 1
                                indent = indent + 1
                            else
                                break
                            end
                        end
                        -- Store indent level on NEWLINE token
                        tokens[#tokens].indent = indent
                    end

                    break -- Process next character after successful match
                end
            end

            -- Safety check for unexpected parsing states
            -- NOTE: SYMBOL fallback should prevent this from ever executing
            if not matched then
                error("Lexer error: Unexpected character at position " .. pos)
            end
        end

        return tokens
    end
end

end

plume_files['plume-engine/utils'] = function ()


return function (plume)
    plume.utils = {}

    --- Trims leading and trailing whitespace from a string
    ---@param s string The input string to process
    ---@return string The trimmed string
    plume.utils.trim = function (s)
       return s:match "^%s*(.-)%s*$"
    end

    --- Checks if a space-separated string contains a specific word
    ---@param s string The space-separated string to search
    ---@param x string The word to look for
    ---@return boolean True if the word is found
    plume.utils.containsWord = function (s, x)
        for w in s:gmatch('%S+') do
            if w == x then
                return true
            end
        end
        return false
    end
end
end

    <script type="application/lua">
        js = require("js")
        global = js.global
        local document = global.document

        local function escape(s)
            return (s or ""):gsub("&", "&amp;")
                        :gsub("<", "&lt;")
                        :gsub(">", "&gt;")
                        :gsub('"', "&quot;")
                        :gsub("'", "&#039;")
        end

        local function updateOutput()
            local inputElement = document:getElementById("code-input")
            local outputElement = document:getElementById("html-output")
            local codeElement = document:getElementById("lua-output")
            local renderElement = document:getElementById("rendered-output")

            local code = inputElement.value
            local sucess, result

            sucess, result = pcall(plume.tokenize, code, "<plume>")
            if sucess then
                sucess, result = pcall(plume.parse, result)
                if sucess then
                    sucess, result = pcall(plume.makeAST, result)
                    if sucess then
                        sucess, result, map = pcall(plume.transpileToLua, result)
                        if sucess then
                            code = plume.beautifier(result)
                            local env = setmetatable({
                                plume = plume.plumeStdLib
                            }, {__index = _G})

                            local f, msg = load(code, "@<plume>", nil, env)
                            print(sucess, result)
                            if f then
                                sucess, result = pcall(f)
                            else
                                sucess = false
                                result = msg
                            end

                            if not sucess then
                                result = plume.convertLuaError(result, map)
                            end
                            
                        end
                    end
                end
            end

            outputElement.innerHTML = "<pre>" .. escape(result).. "</pre>"
            if sucess then
                renderElement.innerHTML = (result or ""):gsub('\n', '<br>')
            else
                renderElement.innerHTML = outputElement.innerHTML
            end

            codeElement.innerHTML = "<pre>" .. escape(code) .. "</pre>"
        end

        local inputElement = document:getElementById("code-input")

        inputElement:addEventListener("input", updateOutput)

        local function handle_tab(self, event)
            if event.key == "Tab" then
                event:preventDefault()

                local input = document:getElementById("code-input")
                local start = input.selectionStart
                local finish = input.selectionEnd
                
                -- Add the tab character
                input.value = input.value:sub(1, start) .. "\t" .. input.value:sub(finish + 1)

                -- Move the cursor to the correct position after the tab
                input.selectionStart = start + 1
                input.selectionEnd = start + 1
            end
        end

        document:getElementById("code-input"):addEventListener("keydown", handle_tab)

        updateOutput()
    </script>
